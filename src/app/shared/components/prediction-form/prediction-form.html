<dialog #predictionModal class="modal">
  <div class="modal-box w-full max-w-sm bg-base-100 p-0">
    <!-- Header -->
    <div class="flex items-center border-b border-base-300 px-4 py-3">
      <!-- form method="dialog": al pulsar cualquier botón dentro, el navegador cierra el <dialog> padre automáticamente (HTML5 nativo, sin JS) -->
      <form method="dialog">
        <button class="btn btn-ghost btn-sm btn-circle">
          <lucide-icon name="arrow-left" size="20"></lucide-icon>
        </button>
      </form>

      <h2 class="flex-1 text-center text-base font-bold">Predecir</h2>

      <div class="w-8"></div>
    </div>

    <!-- Content -->
    <div class="flex flex-col gap-6 px-4 py-5">
      <!-- Match info -->
      <section class="text-center">
        <h3 class="text-lg font-bold">
          {{ match.homeTeam }} <span class="opacity-70">vs</span> {{ match.awayTeam }}
        </h3>

        <p class="mt-1 text-sm font-medium text-base-content/60">
          {{ match.matchDate | date: 'dd MMM · HH:mm' }} · {{ match.location }}
        </p>
      </section>

      <!-- Score Card -->
      <section class="card bg-base-200 shadow-sm">
        <div class="card-body items-center p-6">
          <p class="text-xs font-bold uppercase tracking-wider text-base-content/50">Tu marcador</p>

          <div class="mt-2 grid w-full grid-cols-[1fr_auto_1fr] items-end gap-5">
            <!-- España -->
            <label class="flex flex-col items-center gap-2">
              <span class="text-xs font-semibold text-base-content/60"> {{ match.homeTeam }} </span>

              <input
                type="number"
                min="0"
                [value]="prediction?.predictedHomeGoals"
                placeholder="0"
                [(ngModel)]="userHomeGoals"
                class="input input-bordered h-14 w-14 rounded-lg p-0 text-center text-xl font-bold"
              />
            </label>

            <span class="pb-4 text-2xl font-bold text-base-content/50"> — </span>

            <!-- Brasil -->
            <label class="flex flex-col items-center gap-2">
              <span class="text-xs font-semibold text-base-content/60"> {{ match.awayTeam }} </span>

              <input
                type="number"
                min="0"
                [value]="prediction?.predictedAwayGoals"
                placeholder="0"
                [(ngModel)]="userAwayGoals"
                class="input input-bordered h-14 w-14 rounded-lg p-0 text-center text-xl font-bold"
              />
            </label>
          </div>
        </div>
      </section>

      <!-- Submit -->
      <button class="btn btn-outline w-full" (click)="savePrediction()">Guardar predicción</button>
    </div>
  </div>

  <!-- Mismo patrón: click en el fondo oscuro también cierra el dialog -->
  <form method="dialog" class="modal-backdrop">
    <button>close</button>
  </form>
</dialog>
